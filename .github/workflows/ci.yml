# Generated by review charter v1, 2026-05-15. Soft mode until baseline cleared.
# Vowrite CI pipeline — macOS + iOS multiplatform
#
# Jobs:
#   build-mac   — Swift build (debug on PR, release on push to main)
#   test-kit    — VowriteKit unit tests
#   build-ios   — xcodebuild for VowriteIOS + VowriteKeyboard (hard gate) + F-076 plist check
#   lint        — SwiftLint (hard gate) + swift-format (advisory)
#   parity      — iOS-macOS feature parity check (continue-on-error)
#   secrets     — gitleaks secret scanning (hard gate)
#   review-scan — Full review-scan.sh sweep (continue-on-error: soft start)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── 1. macOS Build ──────────────────────────────────────────────────────────
  build-mac:
    name: Build (macOS)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            VowriteMac/.build
          key: spm-mac-${{ runner.os }}-${{ hashFiles('VowriteMac/Package.swift', 'VowriteKit/Package.swift') }}
          restore-keys: |
            spm-mac-${{ runner.os }}-

      - name: Build VowriteMac (debug)
        working-directory: VowriteMac
        run: |
          set -o pipefail
          swift build -c debug 2>&1 | tee /tmp/build-debug.log
          grep -c "warning:" /tmp/build-debug.log && echo "::notice::Debug build warnings found" || true

      - name: Build VowriteMac (release) — push to main only
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: VowriteMac
        run: |
          set -o pipefail
          swift build -c release 2>&1 | tee /tmp/build-release.log
          WARN_COUNT=$(grep -c "warning:" /tmp/build-release.log || true)
          BASELINE=4
          echo "Release build warnings: $WARN_COUNT (baseline: $BASELINE)"
          if [ "$WARN_COUNT" -gt "$BASELINE" ]; then
            echo "::warning::Release build warning count ($WARN_COUNT) exceeds baseline ($BASELINE)"
          fi

  # ── 2. VowriteKit Tests ─────────────────────────────────────────────────────
  test-kit:
    name: Test (VowriteKit)
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            VowriteKit/.build
          key: spm-kit-${{ runner.os }}-${{ hashFiles('VowriteKit/Package.swift') }}
          restore-keys: |
            spm-kit-${{ runner.os }}-

      - name: Run VowriteKit unit tests
        working-directory: VowriteKit
        run: swift test

  # ── 3. iOS Build (hard gate) ────────────────────────────────────────────────
  build-ios:
    name: Build (iOS)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM & DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: spm-ios-${{ runner.os }}-${{ hashFiles('VowriteKit/Package.swift', 'VowriteIOS/VowriteIOS.xcodeproj/project.pbxproj') }}
          restore-keys: |
            spm-ios-${{ runner.os }}-

      - name: Build VowriteIOS (+ VowriteKeyboard appex dependency)
        run: |
          xcodebuild -project VowriteIOS/VowriteIOS.xcodeproj -scheme VowriteIOS \
            -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build

      - name: F-076 iOS Keyboard Dictation Mic Suppression (plist regression check)
        run: |
          LANG_VAL=$(/usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionAttributes:PrimaryLanguage" VowriteKeyboard/Info.plist)
          ASCII_VAL=$(/usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionAttributes:IsASCIICapable" VowriteKeyboard/Info.plist)
          if [ "$LANG_VAL" = "mul" ] && [ "$ASCII_VAL" = "true" ]; then
            echo "F-076 plist mic-suppression intact (PrimaryLanguage=mul, IsASCIICapable=true)"
          else
            echo "::error::F-076 regressed: PrimaryLanguage='$LANG_VAL' IsASCIICapable='$ASCII_VAL' (must be mul/true) — re-exposes the system dictation mic"
            exit 1
          fi

  # ── 4. Lint (SwiftLint hard gate + swift-format advisory) ──────────────────
  lint:
    name: Lint
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Install swift-format
        run: brew install swift-format

      - name: SwiftLint
        run: |
          if command -v swiftlint &>/dev/null; then
            swiftlint lint --config .swiftlint.yml --reporter github-actions-logging
          else
            echo "::error::swiftlint not available"
            exit 1
          fi

      - name: swift-format lint
        run: |
          if command -v swift-format &>/dev/null; then
            swift-format lint -r \
              VowriteKit/Sources \
              VowriteMac/Sources \
              VowriteIOS/Sources \
              VowriteKeyboard/Sources \
              --configuration .swift-format 2>&1 || true
          else
            echo "::warning::swift-format not available"
          fi

  # ── 5. iOS-macOS Feature Parity ────────────────────────────────────────────
  parity:
    name: Parity Check
    runs-on: macos-14
    timeout-minutes: 10
    continue-on-error: true  # Advisory until parity gaps are resolved
    steps:
      - uses: actions/checkout@v4

      - name: Check iOS-macOS feature parity
        run: bash scripts/check-parity.sh

  # ── 6. Secret Scanning (gitleaks) ──────────────────────────────────────────
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for gitleaks detect

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.30.1"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Run gitleaks detect (full history)
        run: |
          gitleaks detect \
            --no-banner \
            --redact \
            --config .gitleaks.toml \
            --exit-code 1

  # ── 7. Review Scan ──────────────────────────────────────────────────────────
  review-scan:
    name: Review Scan
    runs-on: macos-14
    timeout-minutes: 20
    continue-on-error: true  # Soft mode: advisory until baseline cleared
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            VowriteMac/.build
            VowriteKit/.build
          key: spm-review-${{ runner.os }}-${{ hashFiles('VowriteMac/Package.swift', 'VowriteKit/Package.swift') }}
          restore-keys: |
            spm-review-${{ runner.os }}-

      - name: Install tools (best-effort)
        run: |
          brew install swiftlint swift-format gitleaks || true

      - name: Run review-scan.sh
        run: |
          chmod +x ops/scripts/review-scan.sh
          bash ops/scripts/review-scan.sh --ci --soft --report /tmp/review-scan-report.md
          EXIT=$?
          echo "review-scan exit code: $EXIT"

      - name: Upload review scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-scan-report
          path: /tmp/review-scan-report.md
          if-no-files-found: ignore
