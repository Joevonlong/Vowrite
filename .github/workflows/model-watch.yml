# F-082 — monthly upstream model drift detection.
# Runs ops/scripts/model-watch.py; on findings (exit 10) files/updates a
# `model-watch`-labeled issue with the report. Curation stays human-driven:
# see ops/MODEL_UPDATE_PLAYBOOK.md.
name: Model Watch

on:
  schedule:
    - cron: "0 6 1 * *" # 06:00 UTC on the 1st of every month
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  model-watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Optional per-provider keys (repo secrets). A missing secret just skips
      # that reconciliation source; the keyless OpenRouter signal always runs.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
      SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
      MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
      QIANFAN_API_KEY: ${{ secrets.QIANFAN_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
      MINIMAX_INTL_API_KEY: ${{ secrets.MINIMAX_INTL_API_KEY }}
      MINIMAX_CN_API_KEY: ${{ secrets.MINIMAX_CN_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Run model watch
        id: watch
        run: |
          set +e
          python3 ops/scripts/model-watch.py --report /tmp/model-watch-report.md
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          cat /tmp/model-watch-report.md >> "$GITHUB_STEP_SUMMARY" || true
          # 0 = no drift, 10 = findings, 3 = all sources unreachable (soft).
          if [ "$code" != "0" ] && [ "$code" != "10" ] && [ "$code" != "3" ]; then
            exit "$code"
          fi

      - name: File or update drift issue
        if: steps.watch.outputs.exit_code == '10'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create model-watch \
            --color 1D76DB \
            --description "Automated model catalog drift reports (F-082)" \
            --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --label model-watch \
            --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" \
              --body-file /tmp/model-watch-report.md
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --label model-watch \
              --title "Model watch: upstream model drift ($(date -u +%Y-%m))" \
              --body-file /tmp/model-watch-report.md
          fi
