# Gitleaks configuration for Vowrite
# Generated by review charter v1, 2026-05-15
# Extends the default ruleset with Vowrite-specific provider secrets.

[extend]
useDefault = true

# ── Custom rules for Vowrite's provider integrations ──

[[rules]]
id = "vowrite-openai-key"
description = "OpenAI API key"
regex = '''sk-[A-Za-z0-9]{20,}'''
tags = ["openai", "api-key"]

[[rules]]
id = "vowrite-groq-key"
description = "Groq API key"
regex = '''gsk_[A-Za-z0-9]{30,}'''
tags = ["groq", "api-key"]

[[rules]]
id = "vowrite-anthropic-key"
description = "Anthropic API key"
regex = '''sk-ant-[A-Za-z0-9\-]{30,}'''
tags = ["anthropic", "api-key"]

[[rules]]
id = "vowrite-google-oauth-secret"
description = "Google OAuth client secret"
regex = '''GOCSPX-[A-Za-z0-9_\-]{20,}'''
tags = ["google", "oauth", "api-key"]

[[rules]]
id = "vowrite-ed25519-private-key"
description = "Ed25519 / PEM private key (Sparkle EdDSA signing key)"
regex = '''-----BEGIN[^-]*PRIVATE KEY-----'''
tags = ["private-key", "sparkle"]

[[rules]]
id = "vowrite-minimax-key"
description = "MiniMax API key"
regex = '''(?i)(minimax[_\-]?(?:api[_\-]?)?key\s*[:=]\s*)([A-Za-z0-9\-_]{20,})'''
tags = ["minimax", "api-key"]
secretGroup = 2

[[rules]]
id = "vowrite-kimi-key"
description = "Moonshot/Kimi API key"
regex = '''sk-[A-Za-z0-9]{40,}'''
tags = ["kimi", "moonshot", "api-key"]

# ── Allowlist: exclude files that legitimately contain key *patterns* (regexes, docs, scripts) ──
# Without this, Phase 1's own commit would be flagged by its own rules.

[allowlist]
description = "Files containing regex literals and documentation patterns — not actual secrets"
paths = [
    '''\.gitleaks\.toml$''',
    '''ops/scripts/review-scan\.sh$''',
    '''ops/scripts/test\.sh$''',
    '''docs/PROVIDER_GUIDE\.md$''',
    '''docs/.*REVIEW.*\.md$''',
    '''REVIEW\.md$''',
    '''SECURITY\.md$''',
    '''TESTING\.md$''',
    '''\.github/workflows/.*\.yml$''',
    '''\.githooks/pre-commit$''',
    '''\.(swiftlint|swift-format).*$''',
]
