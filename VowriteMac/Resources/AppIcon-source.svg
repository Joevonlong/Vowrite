  <!-- Cyan audio waveform bars on left leaf -->
  <g fill="#5DCFCF">
    <rect x="295" y="478" width="24" height="104" rx="12"/>
    <rect x="334" y="408" width="24" height="208" rx="12"/>
    <rect x="373" y="440" width="24" height="186" rx="12"/>
    <rect x="412" y="478" width="24" height="186" rx="12"/>
    <rect x="451" y="522" width="24" height="118" rx="12"/>
  </g>

  <!-- White curved lines on right leaf -->
  <g stroke="#FFFFFF" stroke-width="3.5" fill="none" stroke-linecap="round">
    <path d="M 738 286 C 712 462, 672 660, 588 858"/>
    <path d="M 760 292 C 740 472, 702 672, 618 870"/>
  </g>

  <!-- White dots along the curves -->
  <g fill="#FFFFFF">
